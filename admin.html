<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#0A4D9B;
    color:white;
    border:none;
}
</style>

</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){
    if(u.value==="admin" && p.value==="1234"){
        window.location.href="dashboard.html";
    } else {
        alert("Wrong login");
    }
}
</script>

</body>
</html>
