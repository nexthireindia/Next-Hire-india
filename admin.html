<div class="branding">ADMIN DASHBOARD</div>
<div class="job-card">
    <h3>Post New Job</h3>
    <input id="t" placeholder="Title" style="width:100%; padding:10px;"><br>
    <input id="s" placeholder="Salary" style="width:100%; padding:10px;"><br>
    <button class="main-apply-btn" onclick="addJob()">Publish Job</button>
</div>
<div id="apps-list"></div>

<script>
    function addJob() {
        firebase.database().ref('jobs').push({ title: document.getElementById('t').value, salary: document.getElementById('s').value });
        alert("Job Posted!");
    }
    // Application list fetch code...
</script>
