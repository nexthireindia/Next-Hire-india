<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Hire | Secure Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f11;
            --sidebar-bg: #16161a;
            --accent-blue: #3b82f6;
            --border-line: #2a2a35;
            --danger-red: #ef4444;
            --success-green: #10b981;
            --accent-orange: #f26a36;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Lock Box View */
        .lock-container { width: 100%; max-width: 400px; background: var(--sidebar-bg); border: 1px solid var(--border-line); padding: 40px 30px; border-radius: 12px; text-align: center; }
        .lock-container h2 { margin-bottom: 8px; font-weight: 600; }
        .lock-container input { padding: 12px; width: 100%; background: #1f1f24; border: 1px solid var(--border-line); border-radius: 6px; color: #fff; margin-bottom: 20px; text-align: center; outline: none; }
        .lock-container input:focus { border-color: var(--accent-blue); }
        .lock-container button { width: 100%; padding: 12px; background: var(--accent-blue); border: none; border-radius: 6px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .lock-container button:hover { background: #2563eb; }

        /* Dashboard Wrapper */
        .admin-wrapper { width: 100%; height: 100vh; display: none; grid-template-columns: 260px 1fr; }
        
        /* Sidebar Styling */
        .sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--border-line); padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar .brand { font-size: 1.4rem; font-weight: 700; margin-bottom: 30px; color: #fff; text-align: center; }
        .sidebar .menu-btn { width: 100%; padding: 12px 15px; background: transparent; border: none; border-radius: 6px; color: #94a3b8; text-align: left; font-weight: 500; cursor: pointer; transition: 0.2s; outline: none; }
        .sidebar .menu-btn:hover, .sidebar .menu-btn.active { background: var(--accent-blue); color: #fff; }

        /* Main Content View Frame */
        .content-frame { padding: 40px; overflow-y: auto; background: var(--bg-dark); width: 100%; }
        .admin-page { display: none; }
        .admin-page.active { display: block; }

        .page-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 25px; border-bottom: 2px solid var(--border-line); padding-bottom: 10px; }
        
        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-group { flex: 1; display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; }
        input, textarea, select { padding: 12px; background: #1f1f24; border: 1px solid var(--border-line); border-radius: 6px; color: #fff; font-size: 0.9rem; outline: none; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent-blue); }
        
        /* Table Controls */
        .table-responsive { width: 100%; overflow-x: auto; background: var(--sidebar-bg); border-radius: 8px; border: 1px solid var(--border-line); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 20px; border-bottom: 1px solid var(--border-line); font-size: 0.9rem; }
        th { background: #1f1f24; color: #fff; font-weight: 600; }
        td { color: #94a3b8; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        
        .dl-btn { background: var(--success-green); padding: 6px 12px; color: white; border-radius: 4px; text-decoration: none; font-size: 0.8rem; font-weight: 500; display: inline-block; }
        .dl-btn:hover { background: #059669; }
        .del-btn { background: var(--danger-red); padding: 6px 12px; color: white; border: none; border-radius: 4px; font-size: 0.8rem; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .del-btn:hover { background: #dc2626; }
        
        .submit-btn { background: var(--accent-blue); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; width: max-content; }
        .submit-btn:hover { background: #2563eb; }
        .loading-box { text-align: center; padding: 40px; color: #6b7280; font-weight: 600; }
    </style>
</head>
<body>

    <div class="lock-container" id="lockView">
        <h2>Next Hire Controls</h2>
        <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px;">Administrative verification requested.</p>
        <form id="lockForm">
            <input type="password" id="sysPass" placeholder="Enter Control Key" required>
            <button type="submit" id="loginBtn">Access Dashboard</button>
        </form>
    </div>

    <div class="admin-wrapper" id="dashboardView">
        <div class="sidebar">
            <div class="brand">NextHire Admin</div>
            <button class="menu-btn active" id="btnApps">📊 Applications</button>
            <button class="menu-btn" id="btnPost">➕ Post New Job</button>
            <button class="menu-btn" id="btnSecurity">🔐 Security Settings</button>
        </div>

        <div class="content-frame">
            
            <div id="appsPage" class="admin-page active">
                <h1 class="page-title">Received Applications</h1>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Candidate Name</th>
                                <th>Applied Position</th>
                                <th>Email Address</th>
                                <th>Contact</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="applicationsTableBody">
                            <tr>
                                <td colspan="5" class="loading-box">Syncing cloud server data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="postJobPage" class="admin-page">
                <h1 class="page-title">Post a New Job Opening</h1>
                <form id="jobForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="jobTitle">Job Title</label>
                            <input type="text" id="jobTitle" placeholder="e.g. Full Stack Developer" required>
                        </div>
                        <div class="form-group">
                            <label for="jobCategory">Category</label>
                            <select id="jobCategory" required>
                                <option value="" disabled selected>Select Category</option>
                                <option value="development">Development</option>
                                <option value="design">Design</option>
                                <option value="marketing">Marketing</option>
                                <option value="management">Management</option>
                                <option value="customer support">Customer Support</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="jobLocation">Location</label>
                            <input type="text" id="jobLocation" placeholder="e.g. Remote / Mumbai" required>
                        </div>
                        <div class="form-group">
                            <label for="jobSalary">Salary Range</label>
                            <input type="text" id="jobSalary" placeholder="e.g. ₹5,000 - ₹5,00,000 ">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="jobDesc">Job Description & Requirements</label>
                        <textarea id="jobDesc" rows="6" placeholder="Write roles, responsibilities, and requirements here..." required></textarea>
                    </div>
                    <button type="submit" id="jobBtn" class="submit-btn">Publish Job Listing</button>
                </form>
            </div>

            <div id="securityPage" class="admin-page">
                <h1 class="page-title">Console Security Settings</h1>
                <div style="max-width: 500px; background: var(--sidebar-bg); border: 1px solid var(--border-line); padding: 30px; border-radius: 8px;">
                    <form id="changePasswordForm">
                        <div class="form-group">
                            <label>Current Control Key</label>
                            <input type="password" id="currentPass" placeholder="Enter current key" required>
                        </div>
                        <div class="form-group">
                            <label>New Control Key</label>
                            <input type="password" id="newPass" placeholder="Minimum 6 characters" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm New Control Key</label>
                            <input type="password" id="confirmNewPass" placeholder="Repeat new key" required>
                        </div>
                        <button type="submit" id="changePassBtn" class="submit-btn" style="background: var(--accent-orange); margin-top: 10px;">Update Control Key</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBSVWBUsCm-gUjGrpqDcVDJOPezWM9y9gQ",
          authDomain: "next-hire-india.firebaseapp.com",
          databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "next-hire-india",
          storageBucket: "next-hire-india.firebasestorage.app",
          messagingSenderId: "408453370854",
          appId: "1:408453370854:web:4a3ca3b9b312cc9669bc27",
          measurementId: "G-7YV7H965QS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Navigation Menu Controls
        const pages = {
            appsPage: document.getElementById('appsPage'),
            postJobPage: document.getElementById('postJobPage'),
            securityPage: document.getElementById('securityPage')
        };

        const buttons = {
            btnApps: document.getElementById('btnApps'),
            btnPost: document.getElementById('btnPost'),
            btnSecurity: document.getElementById('btnSecurity')
        };

        function switchTab(activePageKey, activeBtn) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            Object.values(buttons).forEach(b => b.classList.remove('active'));
            pages[activePageKey].classList.add('active');
            activeBtn.classList.add('active');
        }

        buttons.btnApps.addEventListener('click', () => switchTab('appsPage', buttons.btnApps));
        buttons.btnPost.addEventListener('click', () => switchTab('postJobPage', buttons.btnPost));
        buttons.btnSecurity.addEventListener('click', () => switchTab('securityPage', buttons.btnSecurity));


        // 1. Firebase System Verification (Login Logic via Database)
        document.getElementById('lockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const passInput = document.getElementById('sysPass').value;
            const loginBtn = document.getElementById('loginBtn');

            try {
                loginBtn.disabled = true;
                loginBtn.innerText = "Verifying...";

                const passRef = ref(db, 'admin/password');
                const snapshot = await get(passRef);

                let savedPassword = "admin123"; // Fallback seed standard key
                if (snapshot.exists()) {
                    savedPassword = snapshot.val();
                } else {
                    // Seed initial key structure if node doesn't exist yet
                    await set(passRef, "admin123");
                }

                if (passInput === savedPassword) {
                    document.getElementById('lockView').style.display = 'none';
                    document.getElementById('dashboardView').style.display = 'grid';
                    document.body.style.alignItems = 'stretch';
                } else {
                    alert('Invalid Control Key! Please try again.');
                }
            } catch (err) {
                alert("Database Sync Error: " + err.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = "Access Dashboard";
            }
        });


        // 2. Firebase Job Publication Logic
        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const jobBtn = document.querySelector('#jobForm .submit-btn');

            try {
                jobBtn.disabled = true;
                jobBtn.innerText = "Publishing Cloud Data...";

                const jobData = {
                    title: document.getElementById('jobTitle').value,
                    category: document.getElementById('jobCategory').value,
                    location: document.getElementById('jobLocation').value,
                    salary: document.getElementById('jobSalary').value,
                    description: document.getElementById('jobDesc').value
                };

                await set(push(ref(db, 'jobs')), jobData);
                alert('🎉 Job listed successfully in cloud systems!');
                document.getElementById('jobForm').reset();
            } catch(err) {
                alert("Error pushing vacancy: " + err.message);
            } finally {
                jobBtn.disabled = false;
                jobBtn.innerText = "Publish Job Listing";
            }
        });


        // 3. Sync Dynamic Candidate Applications
        const tableBody = document.getElementById('applicationsTableBody');
        onValue(ref(db, 'nexthire_applications'), (snapshot) => {
            tableBody.innerHTML = "";
            if(snapshot.exists()) {
                const data = snapshot.val();
                for(let key in data) {
                    const rowData = data[key];
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${rowData.name || "N/A"}</td>
                        <td>${rowData.appliedFor || "N/A"}</td>
                        <td>${rowData.email || "N/A"}</td>
                        <td>${rowData.phone || "N/A"}</td>
                        <td><button class="del-btn" data-id="${key}">Delete</button></td>
                    `;
                    
                    // Wire Delete Node Trigger Action
                    tr.querySelector('.del-btn').addEventListener('click', async function() {
                        const targetId = this.getAttribute('data-id');
                        if(confirm('Are you absolutely sure you want to drop this application data permanently?')) {
                            await remove(ref(db, `nexthire_applications/${targetId}`));
                            alert("Entry dropped successfully.");
                        }
                    });

                    tableBody.appendChild(tr);
                }
            } else {
                tableBody.innerHTML = `<tr><td colspan="5" class="loading-box">No applications found on cloud node ecosystem.</td></tr>`;
            }
        });


        // 4. Update Admin Master Security Key Logic Node
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const currentPass = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmNewPass = document.getElementById('confirmNewPass').value;
            const changePassBtn = document.getElementById('changePassBtn');

            if (newPass !== confirmNewPass) {
                alert("⚠️ New Control Key and Confirm verification block mismatch!");
                return;
            }

            if (newPass.length < 6) {
                alert("⚠️ Control key strength must be at least 6 characters long.");
                return;
            }

            try {
                changePassBtn.disabled = true;
                changePassBtn.innerText = "Processing Cloud Auth Overwrite...";

                const passwordRef = ref(db, 'admin/password'); 
                const snapshot = await get(passwordRef);
                
                let actualCurrentPassword = "admin123";
                if (snapshot.exists()) {
                    actualCurrentPassword = snapshot.val();
                }

                if (currentPass !== actualCurrentPassword) {
                    alert("❌ Current active Control Key is invalid!");
                    return;
                }

                // Push Overwrite Token Command
                await set(passwordRef, newPass);
                alert("🎉 Dashboard control authentication key updated perfectly!");
                document.getElementById('changePasswordForm').reset();
                
            } catch (error) {
                alert("Security pipeline update failure: " + error.message);
            } finally {
                changePassBtn.disabled = false;
                changePassBtn.innerText = "Update Control Key";
            }
        });
    </script>
</body>
</html>
