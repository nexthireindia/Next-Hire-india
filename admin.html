<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Hire | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --border-color: #2a2a35;
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        
        .container { width: 100%; max-width: 900px; display: none; }
        
        /* Lock Screen Styling */
        .auth-container { width: 100%; max-width: 400px; background: var(--card-bg); border: 1px solid var(--border-color); padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .auth-container h2 { font-size: 1.6rem; margin-bottom: 10px; font-weight: 600; }
        .auth-container p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; color: #fff; }
        header p { color: var(--accent-color); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }

        section { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        .section-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; color: #fff; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }

        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        input, textarea, select { padding: 12px; background: #1f1f24; border: 1px solid var(--border-color); border-radius: 8px; color: #fff; font-size: 0.9rem; margin-bottom: 15px; width: 100%; }
        textarea { resize: vertical; height: 80px; }
        button { width: 100%; padding: 12px; background: var(--accent-color); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }
        .btn-danger { background: var(--danger-color); }
        .btn-danger:hover { background: #dc2626; }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        th { background: #1f1f24; color: #fff; font-weight: 600; }
        td { color: var(--text-muted); }
        
        .btn-download { background: #10b981; padding: 5px 10px; font-size: 0.8rem; border-radius: 4px; color: white; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="auth-container" id="authBox">
        <h2>Next Hire Control</h2>
        <p>Enter administrative password to access dashboard.</p>
        <form id="loginForm">
            <input type="password" id="adminPassword" placeholder="Enter Admin Password" required style="text-align: center;">
            <button type="submit">Verify & Open</button>
        </form>
    </div>

    <div class="container" id="dashboardBox">
        <header>
            <h1>Next Hire Dashboard</h1>
            <p>Admin Control Panel</p>
        </header>

        <section style="border-color: #3b82f6; background: #111115;">
            <div class="section-title" style="color: var(--accent-color);">Account Security (Reset Password)</div>
            <form id="resetPassForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Current (Old) Password</label>
                        <input type="password" id="oldPassword" placeholder="Enter your current password" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter any new password" required>
                    </div>
                </div>
                <button type="submit" class="btn-danger" style="width: auto; padding: 10px 25px;">Update Security Key</button>
            </form>
        </section>

        <section>
            <div class="section-title">Create New Job Opening</div>
            <form id="jobForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" id="jobTitle" placeholder="e.g. BPO Executive" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="jobLocation" placeholder="e.g. Indore" required>
                    </div>
                    <div class="form-group">
                        <label>Job Type</label>
                        <select id="jobType">
                            <option value="Full-Time">Full-Time</option>
                            <option value="Part-Time">Part-Time</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Job Description & Requirements</label>
                    <textarea id="jobDesc" placeholder="Enter key responsibilities..." required></textarea>
                </div>
                <button type="submit" style="width: 100%;">Post Job Live</button>
            </form>
        </section>

        <section>
            <div class="section-title">Received Applications</div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Candidate Name</th>
                            <th>Email</th>
                            <th>Mobile</th>
                            <th>Resume</th>
                        </tr>
                    </thead>
                    <tbody id="applicantTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-muted);">Loading applications...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBSVWBUsCm-gUjGrpqDcVDJOPezWM9y9gQ",
          authDomain: "next-hire-india.firebaseapp.com",
          databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "next-hire-india",
          storageBucket: "next-hire-india.firebasestorage.app",
          messagingSenderId: "408453370854",
          appId: "1:408453370854:web:4a3ca3b9b312cc9669bc27",
          measurementId: "G-7YV7H965QS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentDBPassword = "admin123"; 

        // --- PASSWORD SYNC ENGINE ---
        async function fetchCurrentPassword() {
            try {
                const snapshot = await get(ref(db, 'admin_credentials/password'));
                if (snapshot.exists()) {
                    currentDBPassword = snapshot.val();
                    localStorage.setItem('local_admin_pass', currentDBPassword);
                } else {
                    const localBackup = localStorage.getItem('local_admin_pass');
                    currentDBPassword = localBackup ? localBackup : "admin123";
                }
            } catch (err) {
                const localBackup = localStorage.getItem('local_admin_pass');
                currentDBPassword = localBackup ? localBackup : "admin123";
            }
        }
        fetchCurrentPassword();

        // --- LOGIN BLOCK ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const typedPassword = document.getElementById('adminPassword').value;

            await fetchCurrentPassword();

            if (typedPassword === currentDBPassword) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('dashboardBox').style.display = 'block';
                document.body.style.justifyContent = 'flex-start';
                loadDashboardData(); 
            } else {
                alert("❌ Access Denied! Wrong Admin Password.");
                document.getElementById('adminPassword').value = "";
            }
        });

        // --- RESET PASSWORD BLOCK (VALIDATION REMOVED) ---
        document.getElementById('resetPassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;

            if (oldPass !== currentDBPassword) {
                alert("❌ Verification Failed: Current (Old) Password is incorrect!");
                return;
            }

            // Kisi bhi rule ki zaroorat nahi, bas field khali nahi honi chahiye
            if (newPass.trim() === "") {
                alert("Please enter a valid password.");
                return;
            }

            try {
                await set(ref(db, 'admin_credentials/password'), newPass);
                localStorage.setItem('local_admin_pass', newPass);
                alert("🎉 Password updated successfully! Log in again with your new password.");
                location.reload(); 
            } catch (error) {
                localStorage.setItem('local_admin_pass', newPass);
                alert("🎉 Password updated locally!");
                location.reload();
            }
        });

        // --- MAIN DATA LOADING ---
        function loadDashboardData() {
            document.getElementById('jobForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newJob = {
                    title: document.getElementById('jobTitle').value,
                    location: document.getElementById('jobLocation').value,
                    type: document.getElementById('jobType').value,
                    description: document.getElementById('jobDesc').value,
                    postedAt: new Date().toLocaleDateString()
                };
                try {
                    await set(push(ref(db, 'jobs')), newJob);
                    alert("🎉 Job posted successfully!");
                    document.getElementById('jobForm').reset();
                } catch (error) { alert("Error: " + error.message); }
            });

            const tableBody = document.getElementById('applicantTableBody');
            onValue(ref(db, 'nexthire_applications'), (snapshot) => {
                tableBody.innerHTML = "";
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    for (let key in data) {
                        const applicant = data[key];
                        let resumeAction = "No Resume";
                        if (applicant.resume && applicant.resume !== "No resume uploaded") {
                            resumeAction = `<a href="${applicant.resume}" download="${applicant.name}_Resume" class="btn-download">View/Download</a>`;
                        }
                        tableBody.innerHTML += `<tr><td>${applicant.submittedAt ? applicant.submittedAt.split(',')[0] : 'N/A'}</td><td style="color:#fff; font-weight:500;">${applicant.name}</td><td>${applicant.email}</td><td>${applicant.phone}</td><td>${resumeAction}</td></tr>`;
                    }
                } else { tableBody.innerHTML = "<tr><td colspan='5' style='text-align: center;'>No applications received yet.</td></tr>"; }
            });
        }
    </script>
</body>
                  </html>
