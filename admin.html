<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Hire | Secure Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f11;
            --sidebar-bg: #16161a;
            --accent-blue: #3b82f6;
            --border-line: #2a2a35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Lock Box View */
        .lock-container { width: 100%; max-width: 400px; background: var(--sidebar-bg); border: 1px solid var(--border-line); padding: 40px 30px; border-radius: 12px; text-align: center; }
        .lock-container input { padding: 12px; width: 100%; background: #1f1f24; border: 1px solid var(--border-line); border-radius: 6px; color: #fff; margin-bottom: 20px; text-align: center; }
        .lock-container button { width: 100%; padding: 12px; background: var(--accent-blue); border: none; border-radius: 6px; color: #fff; font-weight: 600; cursor: pointer; }

        /* Dashboard Wrapper (Hidden Initially) */
        .admin-wrapper { width: 100%; height: 100vh; display: none; grid-template-columns: 260px 1fr; }
        
        /* Sidebar Styling */
        .sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--border-line); padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar .brand { font-size: 1.4rem; font-weight: 700; margin-bottom: 30px; color: #fff; text-align: center; }
        .sidebar .menu-btn { width: 100%; padding: 12px 15px; background: transparent; border: none; border-radius: 6px; color: #94a3b8; text-align: left; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .sidebar .menu-btn:hover, .sidebar .menu-btn.active { background: var(--accent-blue); color: #fff; }

        /* Main Content View Frame */
        .content-frame { padding: 40px; overflow-y: auto; background: var(--bg-dark); }
        .admin-page { display: none; }
        .admin-page.active { display: block; }

        .page-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 25px; border-bottom: 2px solid var(--border-line); padding-bottom: 10px; }
        
        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; }
        input, textarea, select { padding: 12px; background: #1f1f24; border: 1px solid var(--border-line); border-radius: 6px; color: #fff; font-size: 0.9rem; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-line); font-size: 0.9rem; }
        th { background: #1f1f24; color: #fff; }
        td { color: #94a3b8; }
        .dl-btn { background: #10b981; padding: 4px 10px; color: white; border-radius: 4px; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="lock-container" id="lockView">
        <h2>Next Hire Controls</h2>
        <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px;">Administrative verification requested.</p>
        <form id="lockForm">
            <input type="password" id="sysPass" placeholder="Enter Control Key" required>
            <button type="submit">Access Dashboard</button>
        </form>
    </div>

    <div class="admin-wrapper" id="dashboardView">
        <div class="sidebar">
            <div class="brand">NextHire Admin</div>
            <button class="menu-btn active" onclick="switchPage('appsPage', this)">📊 Applications</button>
            <button class="menu-btn" onclick="switchPage('postJobPage', this)">➕ Post New Job</button>
            <button class="menu-btn" onclick="switchPage('securityPage', this)">🔒 Password Manager</button>
        </div>

        <div class="content-frame">
            
            <div id="appsPage" class="admin-page active">
                <div class="page-title">Received Applications</div>
                <table style="width: 100%;">
                    <thead>
                        <tr>
                            <th>Candidate</th>
                            <th>Role Applied</th>
                            <th>Contact Info</th>
                            <th>Resume</th>
                        </tr>
                    </thead>
                    <tbody id="appTableBody">
                        <tr><td colspan="4" style="text-align: center;">Syncing cloud node...</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="postJobPage" class="admin-page">
                <div class="page-title">Publish New Opening</div>
                <form id="newJobForm">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label>Role Profile Title</label>
                        <input type="text" id="tJob" placeholder="e.g. Graduate Engineer Trainee" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Posting Location</label>
                            <input type="text" id="lJob" placeholder="e.g. Indore" required>
                        </div>
                        <div class="form-group">
                            <label>Classification</label>
                            <select id="typeJob">
                                <option value="Full-Time">Full-Time</option>
                                <option value="Part-Time">Part-Time</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>Job Specifications</label>
                        <textarea id="dJob" style="height: 100px; resize: none;" placeholder="Provide scope of responsibilities..." required></textarea>
                    </div>
                    <button type="submit" style="background: var(--accent-blue); color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">Launch Live</button>
                </form>
            </div>

            <div id="securityPage" class="admin-page">
                <div class="page-title">Update Security Credentials</div>
                <form id="passUpdateForm" style="max-width: 450px;">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label>Provide Current Password</label>
                        <input type="password" id="oldP" placeholder="Current authentication key" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>Define New Password</label>
                        <input type="password" id="newP" placeholder="Define any code sequence" required>
                    </div>
                    <button type="submit" style="background: #ef4444; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">Confirm Update</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        // Global tab shifting function
        window.switchPage = function(pageId, element) {
            document.querySelectorAll('.admin-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBSVWBUsCm-gUjGrpqDcVDJOPezWM9y9gQ",
          authDomain: "next-hire-india.firebaseapp.com",
          databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "next-hire-india",
          storageBucket: "next-hire-india.firebasestorage.app",
          messagingSenderId: "408453370854",
          appId: "1:408453370854:web:4a3ca3b9b312cc9669bc27",
          measurementId: "G-7YV7H965QS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let activeAdminKey = "admin123";

        async function pullKey() {
            try {
                const s = await get(ref(db, 'admin_credentials/password'));
                if(s.exists()) { activeAdminKey = s.val(); }
                else { localStorage.getItem('bk_key') ? activeAdminKey = localStorage.getItem('bk_key') : activeAdminKey="admin123"; }
            } catch(e) { if(localStorage.getItem('bk_key')) activeAdminKey = localStorage.getItem('bk_key'); }
        }
        pullKey();

        // Lock login handler
        document.getElementById('lockForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await pullKey();
            if(document.getElementById('sysPass').value === activeAdminKey) {
                document.getElementById('lockView').style.display = 'none';
                document.getElementById('dashboardView').style.display = 'grid';
                document.body.style.alignItems = 'stretch';
                initDataActions();
            } else {
                alert("❌ Verification Rejected!");
                document.getElementById('sysPass').value = "";
            }
        });

        function initDataActions() {
            // Add Job Post
            document.getElementById('newJobForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const jobPayload = {
                    title: document.getElementById('tJob').value,
                    location: document.getElementById('lJob').value,
                    type: document.getElementById('typeJob').value,
                    description: document.getElementById('dJob').value
                };
                try {
                    await set(push(ref(db, 'jobs')), jobPayload);
                    alert("🎉 Job Active On Global Desk!");
                    document.getElementById('newJobForm').reset();
                } catch(err) { alert(err.message); }
            });

            // Password Manager (No validation engine)
            document.getElementById('passUpdateForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const oldInput = document.getElementById('oldP').value;
                const newInput = document.getElementById('newP').value;

                if(oldInput !== activeAdminKey) {
                    alert("❌ Current active authorization key is wrong!");
                    return;
                }
                try {
                    await set(ref(db, 'admin_credentials/password'), newInput);
                    localStorage.setItem('bk_key', newInput);
                    alert("🎉 Security Context Shifted! Rebooting dashboard layout.");
                    location.reload();
                } catch(err) {
                    localStorage.setItem('bk_key', newInput);
                    location.reload();
                }
            });

            // Applications stream sync
            const bodyRef = document.getElementById('appTableBody');
            onValue(ref(db, 'nexthire_applications'), (snap) => {
                bodyRef.innerHTML = "";
                if(snap.exists()) {
                    const dict = snap.val();
                    for(let node in dict) {
                        const item = dict[node];
                        bodyRef.innerHTML += `<tr>
                            <td><b>${item.name}</b><br><small style='color:#64748b;'>${item.submittedAt}</small></td>
                            <td><span style='color:#fff; font-weight:500;'>${item.appliedFor}</span></td>
                            <td>📧 ${item.email}<br>📞 ${item.phone}</td>
                            <td><a href='${item.resume}' target='_blank' class='dl-btn'>Launch Document</a></td>
                        </tr>`;
                    }
                } else { bodyRef.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No entries listed in cloud database node.</td></tr>"; }
            });
        }
    </script>
</body>
        </html>
