<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NextHire | Admin Command Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #002855; color: white; }
        .btn-invite { background: #25d366; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        input { padding: 8px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Manage Applications</h2>
    <table>
        <thead><tr><th>Name</th><th>Role</th><th>Phone</th><th>Actions</th></tr></thead>
        <tbody id="appTable"></tbody>
    </table>

    <div class="section">
        <h2>➕ Manage Job Postings</h2>
        <input type="text" id="jobTitle" placeholder="Job Title">
        <button onclick="addJob()">Post Job</button>
        <ul id="jobList"></ul>
    </div>

    <div class="section">
        <h2>🔐 Security: Change Password</h2>
        <input type="password" id="newPass" placeholder="New Password">
        <button onclick="updatePassword()">Update Password</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, remove, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({
        databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app"
    }));

    // 1. Applications Load & Delete
    onValue(ref(db, 'nexthire_applications'), (snap) => {
        const tbody = document.getElementById('appTable');
        tbody.innerHTML = "";
        snap.forEach(s => {
            const d = s.val();
            tbody.innerHTML += `<tr><td>${d.name}</td><td>${d.appliedFor}</td><td>${d.phone}</td>
            <td><button class="btn-invite" onclick="window.open('https://wa.me/${d.phone.replace(/\D/g,'')}?text=Hello ${d.name}, you are invited for interview at NextHire!')">Invite</button>
            <button class="btn-del" onclick="remove(ref(db, 'nexthire_applications/${s.key}'))">Delete</button></td></tr>`;
        });
    });

    // 2. Jobs Load & Delete
    onValue(ref(db, 'jobs'), (snap) => {
        const list = document.getElementById('jobList');
        list.innerHTML = "";
        snap.forEach(s => {
            list.innerHTML += `<li>${s.val().title} <button class="btn-del" onclick="remove(ref(db, 'jobs/${s.key}'))">Delete Job</button></li>`;
        });
    });

    // Global Functions for UI
    window.addJob = () => {
        const title = document.getElementById('jobTitle').value;
        if(title) { push(ref(db, 'jobs'), {title: title}); document.getElementById('jobTitle').value = ""; }
    };

    window.updatePassword = () => {
        const pass = document.getElementById('newPass').value;
        if(pass.length >= 6) { set(ref(db, 'admin/password'), pass); alert("Password Updated!"); }
        else { alert("Min 6 chars!"); }
    };
</script>
</body>
</html>
