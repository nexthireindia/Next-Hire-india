<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Hire | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --border-color: #2a2a35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; color: #fff; }
        header p { color: var(--accent-color); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }

        section { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        .section-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; color: #fff; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }

        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        input, textarea, select { padding: 12px; background: #1f1f24; border: 1px solid var(--border-color); border-radius: 8px; color: #fff; font-size: 0.9rem; }
        textarea { resize: vertical; height: 80px; }
        button { padding: 12px; background: var(--accent-color); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        th { background: #1f1f24; color: #fff; font-weight: 600; }
        td { color: var(--text-muted); }
        
        .btn-download { background: #10b981; padding: 5px 10px; font-size: 0.8rem; border-radius: 4px; color: white; text-decoration: none; display: inline-block; }
        .btn-download:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Next Hire Dashboard</h1>
            <p>Admin Control Panel</p>
        </header>

        <section>
            <div class="section-title">Create New Job Opening</div>
            <form id="jobForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Job Title</label>
                        <input type="text" id="jobTitle" placeholder="e.g. BPO Executive, Data Entry" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="jobLocation" placeholder="e.g. Remote, Indore, Delhi" required>
                    </div>
                    <div class="form-group">
                        <label>Job Type</label>
                        <select id="jobType">
                            <option value="Full-Time">Full-Time</option>
                            <option value="Part-Time">Part-Time</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Job Description & Requirements</label>
                    <textarea id="jobDesc" placeholder="Enter key responsibilities and eligibility criteria..." required></textarea>
                </div>
                <button type="submit" style="width: 100%;">Post Job Live</button>
            </form>
        </section>

        <section>
            <div class="section-title">Received Applications</div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Candidate Name</th>
                            <th>Email</th>
                            <th>Mobile</th>
                            <th>Resume</th>
                        </tr>
                    </thead>
                    <tbody id="applicantTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-muted);">Loading applications...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBSVWBUsCm-gUjGrpqDcVDJOPezWM9y9gQ",
          authDomain: "next-hire-india.firebaseapp.com",
          databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "next-hire-india",
          storageBucket: "next-hire-india.firebasestorage.app",
          messagingSenderId: "408453370854",
          appId: "1:408453370854:web:4a3ca3b9b312cc9669bc27",
          measurementId: "G-7YV7H965QS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newJob = {
                title: document.getElementById('jobTitle').value,
                location: document.getElementById('jobLocation').value,
                type: document.getElementById('jobType').value,
                description: document.getElementById('jobDesc').value,
                postedAt: new Date().toLocaleDateString()
            };

            try {
                await set(push(ref(db, 'jobs')), newJob);
                alert("🎉 Job posted successfully! It is now live on the main page.");
                document.getElementById('jobForm').reset();
            } catch (error) {
                alert("Error posting job: " + error.message);
            }
        });

        const tableBody = document.getElementById('applicantTableBody');
        onValue(ref(db, 'nexthire_applications'), (snapshot) => {
            tableBody.innerHTML = "";
            if (snapshot.exists()) {
                const data = snapshot.val();
                for (let key in data) {
                    const applicant = data[key];
                    
                    let resumeAction = "No Resume";
                    if (applicant.resume && applicant.resume !== "No resume uploaded") {
                        resumeAction = `<a href="${applicant.resume}" download="${applicant.name}_Resume" class="btn-download">View/Download</a>`;
                    }

                    const row = `
                        <tr>
                            <td>${applicant.submittedAt ? applicant.submittedAt.split(',')[0] : 'N/A'}</td>
                            <td style="color:#fff; font-weight:500;">${applicant.name}</td>
                            <td>${applicant.email}</td>
                            <td>${applicant.phone}</td>
                            <td>${resumeAction}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                }
            } else {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align: center;'>No applications received yet.</td></tr>";
            }
        });
    </script>
</body>
  </html>
