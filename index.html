<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <header><div class="logo"><span>Next</span> <span>Hire</span> India</div></header>
    
    <div class="job-container" id="jobs">
        </div>

    <script>
        const firebaseConfig = { /* ... (Same Config) ... */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('jobs').on('value', (snapshot) => {
            const container = document.getElementById('jobs');
            container.innerHTML = '';
            snapshot.forEach((child) => {
                const job = child.val();
                container.innerHTML += `
                    <div class="job-card">
                        <h3>${job.title}</h3>
                        <p>Salary: ${job.salary}</p>
                        <button class="btn-primary" onclick="alert('${job.desc}')">View More</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
