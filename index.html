<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <section class="hero">
        <h1>Connecting People With Opportunities</h1>
        <button class="btn-primary" onclick="window.location.href='admin.html'">Admin Login</button>
    </section>

    <h2 style="text-align:center; margin:30px 0;">Latest Jobs</h2>
    <div id="jobs-container"></div>

    <script>
        const config = { apiKey: "AIzaSyBSVWBUsCm-gUjGrpqDcVDJOPezWM9y9gQ", databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "next-hire-india" };
        firebase.initializeApp(config);
        
        firebase.database().ref('jobs').on('value', (snap) => {
            const container = document.getElementById('jobs-container');
            container.innerHTML = '';
            snap.forEach((child) => {
                const job = child.val();
                container.innerHTML += `
                    <div class="job-card">
                        <h3>${job.title}</h3>
                        <p><b>Location:</b> ${job.location} | <b>Salary:</b> ${job.salary}</p>
                        <p>${job.desc.substring(0, 50)}...</p>
                        <button onclick="alert('${job.desc}')">View More</button>
                        <button class="btn-primary" style="padding:5px 10px;">Apply Now</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
