<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Hire | Premium Hiring Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2a2a35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            color: #fff;
        }

        .job-card {
            background: #1f1f24;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .job-card h3 {
            font-size: 1.2rem;
            color: #fff;
        }

        .job-card .meta {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin: 5px 0 10px 0;
            font-weight: 500;
        }

        .job-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"], input[type="email"], input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            background: #1f1f24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .phone-box {
            display: flex;
            align-items: center;
            background: #1f1f24;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .phone-box span {
            padding: 12px 15px;
            background: #2a2a35;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .phone-box input {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
        }

        input:focus, .phone-box:focus-within {
            border-color: var(--accent-color);
            outline: none;
        }

        input[type="file"]::file-selector-button {
            background: var(--border-color);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Next Hire</h1>
            <p>Connecting Talent with Opportunity</p>
        </header>

        <section id="jobs">
            <div class="section-title">Latest Jobs</div>
            <div id="jobList">
                <p style="color: var(--text-muted); font-size: 0.9rem;">Loading available jobs...</p>
            </div>
        </section>

        <section id="apply">
            <div class="section-title">Apply For Job</div>
            <form id="applyForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number *</label>
                    <div class="phone-box">
                        <span>+91</span>
                        <input type="tel" id="phone" maxlength="10" pattern="[0-9]{10}" placeholder="10 Digit Mobile Number" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Upload Resume (Optional)</label>
                    <input type="file" id="resume" accept=".pdf,.doc,.docx">
                </div>

                <button type="submit" class="submit-btn">Submit Application</button>
            </form>
        </section>

        <footer>
            <p>© 2026 Next Hire India. All Rights Reserved.</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBSVWBUsCm-gUjGrpqDcVDJOPezWM9y9gQ",
          authDomain: "next-hire-india.firebaseapp.com",
          databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "next-hire-india",
          storageBucket: "next-hire-india.firebasestorage.app",
          messagingSenderId: "408453370854",
          appId: "1:408453370854:web:4a3ca3b9b312cc9669bc27",
          measurementId: "G-7YV7H965QS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const jobListContainer = document.getElementById('jobList');
        onValue(ref(db, 'jobs'), (snapshot) => {
            jobListContainer.innerHTML = ""; 
            if (snapshot.exists()) {
                const jobsData = snapshot.val();
                for (let jobId in jobsData) {
                    const job = jobsData[jobId];
                    const jobCard = `
                        <div class="job-card">
                            <h3>${job.title}</h3>
                            <div class="meta">${job.location || 'India'} | ${job.type || 'Full-Time'}</div>
                            <p>${job.description}</p>
                        </div>
                    `;
                    jobListContainer.innerHTML += jobCard;
                }
            } else {
                jobListContainer.innerHTML = "<p style='color: var(--text-muted); font-size: 0.9rem;'>No active openings right now. Check back later!</p>";
            }
        });

        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = "+91" + document.getElementById('phone').value;
            const resumeFile = document.getElementById('resume').files[0];

            const getBase64 = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                });
            };

            try {
                let resumeBase64 = "No resume uploaded";
                if (resumeFile) {
                    resumeBase64 = await getBase64(resumeFile);
                }

                const applicantData = {
                    name,
                    email,
                    phone,
                    resume: resumeBase64,
                    submittedAt: new Date().toLocaleString()
                };

                await set(push(ref(db, 'nexthire_applications')), applicantData);
                
                alert(`✨ Thank you, ${name}!\nYour application has been successfully submitted to Next Hire. Our team will review your details and get back to you soon.`);
                document.getElementById('applyForm').reset();

            } catch (error) {
                alert("Something went wrong. Please try again: " + error.message);
            } finally {
                submitBtn.innerText = "Submit Application";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
                      </html>
