<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>
<div class="branding">NEXT HIRE INDIA</div>
<section class="hero">
    <h1>Connecting people with opportunities</h1>
    <button class="apply-btn" onclick="document.getElementById('jobs').scrollIntoView({behavior:'smooth'})">Apply Now</button>
</section>

<div id="jobs"><h2 style="text-align:center; margin:40px 0;">Latest Jobs</h2></div>

<!-- Application Modal -->
<div id="applyModal" class="modal"><div class="modal-content">
    <h3>Apply for Job</h3>
    <input type="text" id="userName" placeholder="Name" style="width:100%; margin:5px 0;">
    <input type="text" id="userPhone" placeholder="Phone" style="width:100%; margin:5px 0;">
    <button class="apply-btn" onclick="submitApp()">Submit</button>
</div></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
    const config = { apiKey: "AIzaSyBSVWBUsCm-gUjGrpqDcVDJOPezWM9y9gQ", databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "next-hire-india" };
    firebase.initializeApp(config);
    let selectedJob = "";
    firebase.database().ref('jobs').on('value', (snap) => {
        const container = document.getElementById('jobs');
        container.innerHTML = '<h2 style="text-align:center; margin:40px 0;">Latest Jobs</h2>';
        snap.forEach((child) => {
            const job = child.val();
            container.innerHTML += `<div class="job-card"><h3>${job.title}</h3><p>Salary: ${job.salary}</p><button class="apply-btn" style="padding:8px 15px;" onclick="openModal('${job.title}')">Apply Now</button></div>`;
        });
    });
    function openModal(title) { selectedJob = title; document.getElementById('applyModal').style.display='block'; }
    function submitApp() {
        firebase.database().ref('applications').push({ name: document.getElementById('userName').value, phone: document.getElementById('userPhone').value, jobTitle: selectedJob });
        alert("Applied!"); document.getElementById('applyModal').style.display='none';
    }
</script>
</body>
</html>
