<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Next Hire India</title>
</head>
<body>
    <div class="branding"><span class="next">Next</span> <span class="hire">Hire</span> India</div>
    
    <section class="hero" id="hero">
        <h1>Connecting People With Opportunities</h1>
        <button class="main-apply-btn" onclick="document.getElementById('jobs').scrollIntoView()">Apply Now</button>
    </section>

    <div id="jobs"><h2 style="text-align:center;">Latest Jobs</h2></div>

    <!-- Modal -->
    <div id="applyModal" class="modal">
        <div class="modal-content">
            <div id="formView">
                <h3>Apply for: <span id="jobTitleDisplay"></span></h3>
                <input type="text" id="n" placeholder="Full Name" required style="width:100%; padding:10px; margin:5px 0;">
                <input type="email" id="e" placeholder="Email" required style="width:100%; padding:10px; margin:5px 0;">
                <input type="text" id="p" value="+91" maxlength="13" required style="width:100%; padding:10px; margin:5px 0;">
                <button class="main-apply-btn" style="width:100%;" onclick="submitApp()">Submit Application</button>
            </div>
            <div id="successView" style="display:none; text-align:center;">
                <h2 style="color:green;">Successfully Submitted!</h2>
                <p>Thank you. We will contact you soon.</p>
                <button class="main-apply-btn" onclick="location.reload()">Back to Home</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { /* Apna config yahan daal */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function submitApp() {
            const data = { 
                name: document.getElementById('n').value, 
                email: document.getElementById('e').value, 
                phone: document.getElementById('p').value, 
                jobTitle: window.selectedJob 
            };
            db.ref('applications').push(data);
            document.getElementById('formView').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
        }
    </script>
</body>
</html>
