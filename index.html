<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Hire India | Careers</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .brand { font-weight: 700; font-size: 28px; color: #002855; text-align: center; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .job-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; background-color: #fafafa; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 12px; background: #002855; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 10px; }
        button:hover { background: #003d7a; }
    </style>
</head>
<body>

    <div class="brand">Next Hire India</div>

    <div class="container">
        <div class="job-card">
            <h2 style="margin-top:0; color:#002855;">BPO Executive</h2>
            <p><strong>Location:</strong> Bhopal</p>
            <p><strong>Salary:</strong> 12,000 - 18,000</p>
        </div>

        <form id="applyForm">
            <input type="text" id="cName" placeholder="Full Name" required>
            <input type="email" id="cEmail" placeholder="Email Address" required>
            <input type="tel" id="cPhone" value="+91 " maxlength="14" required 
                   oninput="this.value = '+91 ' + this.value.replace(/[^0-9]/g, '').slice(0, 10)">
            <button type="submit" id="btnSubmit">Submit Application</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Form Submission Logic
        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "Submitting...";

            const name = document.getElementById('cName').value;
            const email = document.getElementById('cEmail').value;
            const phone = document.getElementById('cPhone').value;

            firebase.database().ref('nexthire_applications').push({
                name: name,
                email: email,
                phone: phone,
                appliedAt: new Date().toLocaleString()
            }).then(() => {
                alert("Application Submitted Successfully!");
                document.getElementById('applyForm').reset();
                document.getElementById('cPhone').value = "+91 ";
                btn.disabled = false;
                btn.innerText = "Submit Application";
            }).catch((error) => {
                alert("Error: " + error.message);
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
