<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Next Hire</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS INSIDE HTML -->
    <style>
        body{
            margin:0;
            font-family:'Poppins', sans-serif;
            background:#f5f7fb;
        }

        header{
            background:linear-gradient(135deg,#0A4D9B,#0F6BD9);
            color:white;
            text-align:center;
            padding:40px 20px;
        }

        header h1{
            margin:0;
            font-size:42px;
            font-weight:700;
        }

        header p{
            margin-top:10px;
            font-size:18px;
            opacity:0.9;
        }

        .hero{
            text-align:center;
            padding:60px 20px;
        }

        .hero h2{
            font-size:32px;
            color:#0A4D9B;
            margin-bottom:15px;
        }

        .hero p{
            color:#555;
            margin-bottom:30px;
        }

        .hero button{
            background:#0A4D9B;
            color:white;
            border:none;
            padding:15px 35px;
            font-size:17px;
            font-weight:bold;
            border-radius:50px;
            cursor:pointer;
            box-shadow:0 8px 20px rgba(10,77,155,.25);
            transition:0.3s;
        }

        .hero button:hover{
            background:#083b76;
            transform:translateY(-2px);
        }
    </style>

</head>

<body>

<header>
    <h1>Next Hire</h1>
    <p>Connecting Talent with Opportunity</p>
</header>

<section class="hero">
    <h2>Find Your Next Career Opportunity</h2>
    <p>Start your journey with Next Hire.</p>

    <button>Apply Now</button>
</section>

</body>
</html>
