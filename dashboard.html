<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Poppins;
    background:#f5f7fb;
    padding:20px;
}

.box{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:500px;
    margin:auto;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px;
    background:#0A4D9B;
    color:white;
    border:none;
    width:100%;
}
</style>

</head>

<body>

<div class="box">

<h2>Add Job</h2>

<input id="title" placeholder="Job Title">
<input id="location" placeholder="Location">
<textarea id="desc" placeholder="Job Description"></textarea>

<button onclick="addJob()">Add Job</button>

</div>

<script>
function addJob(){

let jobs = JSON.parse(localStorage.getItem("jobs") || "[]");

jobs.push({
title:title.value,
location:location.value,
desc:desc.value
});

localStorage.setItem("jobs", JSON.stringify(jobs));

alert("Job Added Successfully");

title.value="";
location.value="";
desc.value="";
}
</script>

</body>
</html>
