<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Next Hire Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h2>Next Hire Admin Panel</h2>
</header>

<div class="container">

  <h2>Add New Job</h2>

  <form id="jobForm">
    <input type="text" id="title" placeholder="Job Title" required>
    <input type="text" id="company" placeholder="Company Name" required>
    <input type="text" id="location" placeholder="Location" required>
    <input type="text" id="salary" placeholder="Salary" required>
    <textarea id="description" placeholder="Job Description" required></textarea>

    <button type="submit">Add Job</button>
  </form>

  <h2>Live Jobs</h2>
  <div id="jobList"></div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="dashboard.js"></script>

</body>
</html>
