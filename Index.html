<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Hire | Careers Portal</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .form-panel { max-width: 400px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #002855; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-panel" id="formPanel">
    <h3>Apply for Job</h3>
    <form id="applyForm">
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="cName" required>
        </div>
        <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" id="cPhone" value="+91 " maxlength="14" required 
                   oninput="this.value = '+91 ' + this.value.replace(/[^0-9]/g, '').slice(0, 10)">
        </div>
        <button type="submit" id="submitBtn" class="btn-submit">Submit</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({
        databaseURL: "https://next-hire-india-default-rtdb.asia-southeast1.firebasedatabase.app"
    }));

    document.getElementById('applyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('cName').value;
        const phone = document.getElementById('cPhone').value;

        try {
            await push(ref(db, 'nexthire_applications'), {
                name: name,
                phone: phone,
                appliedAt: new Date().toLocaleString()
            });
            document.getElementById('formPanel').innerHTML = "<h3>Application Submitted!</h3><p>We will contact you soon.</p>";
        } catch (err) {
            alert("Error: " + err.message);
        }
    });
</script>
</body>
</html>
